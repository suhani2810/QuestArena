name: questarena
description: "A real-time multiplayer quiz battle platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Firebase (Updated for compatibility)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0

  # Networking & Images
  dio: ^5.4.0
  cached_network_image: ^3.3.0

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  screenshot: ^3.0.0
  share_plus: ^13.2.0
  path_provider: ^2.1.6
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21